<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Test online</title>

<style>
body { font-family: Arial; margin: 20px; }
button { padding: 10px 15px; margin: 10px 5px; cursor: pointer; }

.question {
    border: 1px solid #ddd;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
}
</style>

</head>
<body>

<h1>📘 Test online</h1>

<!-- 📂 wybór kategorii -->
<select id="categorySelect">
    <option value="all">📚 Wszystkie kategorie</option>
</select>

<br><br>

<button onclick="loadFromGit()">📥 Załaduj pytania</button>
<button onclick="start()">🚀 Start testu</button>

<div id="quiz"></div>
<div id="result" style="font-size:20px; margin-top:20px;"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

let questions = [];
let selected = [];

/* 🔴 LINK DO GITHUB RAW */
const FILE_URL = "https://raw.githubusercontent.com/kubelton/Test/main/test.xlsx";

/* 📥 LOAD EXCEL */
async function loadFromGit() {
    try {
        const response = await fetch(FILE_URL);
        const data = await response.arrayBuffer();

        const workbook = XLSX.read(new Uint8Array(data), { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];

        questions = XLSX.utils.sheet_to_json(sheet);

        buildCategories();

        alert("Załadowano pytań: " + questions.length);

    } catch (err) {
        alert("Błąd ładowania pliku!");
        console.error(err);
    }
}

/* 📂 kategorie */
function buildCategories() {
    const categories = [...new Set(questions.map(q => q.kategoria))];

    const select = document.getElementById("categorySelect");

    categories.forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
    });
}

/* 🔀 odpowiedzi */
function shuffleAnswers(q) {
    return [
        { key: "A", text: q.A },
        { key: "B", text: q.B },
        { key: "C", text: q.C },
        { key: "D", text: q.D }
    ].sort(() => Math.random() - 0.5);
}

/* 🚀 START TESTU */
function start() {

    if (questions.length === 0) {
        alert("Najpierw załaduj pytania!");
        return;
    }

    const selectedCategory = document.getElementById("categorySelect").value;

    let pool = questions;

    /* 🔥 filtr kategorii */
    if (selectedCategory !== "all") {
        pool = questions.filter(q => q.kategoria === selectedCategory);
    }

    if (pool.length === 0) {
        alert("Brak pytań w tej kategorii!");
        return;
    }

    /* 🔀 losowanie */
    selected = pool
        .map(q => ({ q, r: Math.random() }))
        .sort((a, b) => a.r - b.r)
        .map(x => x.q)
        .slice(0, 60)
        .sort(() => Math.random() - 0.5);

    let html = "";

    selected.forEach((q, i) => {

        const answers = shuffleAnswers(q);

        html += `
        <div class="question">
            <b>${i + 1}. ${q.pytanie}</b><br><br>
        `;

        answers.forEach(a => {
            html += `
            <label>
                <input type="radio" name="q${i}" value="${a.key}">
                ${a.text}
            </label><br>
            `;
        });

        html += `</div>`;
    });

    html += `<button onclick="check()">✅ Sprawdź wynik</button>`;

    document.getElementById("quiz").innerHTML = html;
    document.getElementById("result").innerHTML = "";
}

/* 🧮 SPRAWDZANIE + POPRAWNE ODPOWIEDZI */
function check() {

    let score = 0;
    let resultHTML = "";

    selected.forEach((q, i) => {

        const ans = document.querySelector(`input[name=q${i}]:checked`);
        const userKey = ans ? ans.value : null;

        const correctKey = q.poprawna;

        const userText = userKey ? q[userKey] : "BRAK";
        const correctText = q[correctKey];

        if (userKey === correctKey) score++;

        resultHTML += `
        <div class="question">

            <b>${i + 1}. ${q.pytanie}</b><br><br>

            Twoja odpowiedź:<br>
            <span style="color:${userKey === correctKey ? 'green' : 'red'}; font-weight:bold;">
                ${userText}
            </span><br><br>

            Poprawna odpowiedź:<br>
            <span style="color:green; font-weight:bold;">
                ${correctText}
            </span>

        </div>
        `;
    });

    document.getElementById("result").innerHTML =
        `🏁 Wynik: <b>${score} / ${selected.length}</b> (${Math.round(score / selected.length * 100)}%)<br><br>
        <h2>📊 Analiza:</h2>
        ${resultHTML}`;
}

</script>

</body>
</html>
