<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>
</head>
<body>

<h1>Test online</h1>
<input type="file" id="fileInput">
<button onclick="start()">Start testu</button>

<div id="quiz"></div>
<div id="result"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
let questions = [];
let selected = [];

document.getElementById('fileInput').addEventListener('change', handleFile);

function handleFile(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        questions = XLSX.utils.sheet_to_json(sheet);
        alert("Załadowano pytań: " + questions.length);
    };

    reader.readAsArrayBuffer(file);
}

function start() {
    selected = questions.sort(() => Math.random() - 0.5).slice(0, 60);

    let html = "";

    selected.forEach((q, i) => {
        html += `
        <p><b>${i+1}. ${q.pytanie}</b></p>
        <label><input type="radio" name="q${i}" value="A"> ${q.A}</label><br>
        <label><input type="radio" name="q${i}" value="B"> ${q.B}</label><br>
        <label><input type="radio" name="q${i}" value="C"> ${q.C}</label><br>
        <label><input type="radio" name="q${i}" value="D"> ${q.D}</label><br><br>
        `;
    });

    html += `<button onclick="check()">Sprawdź</button>`;
    document.getElementById("quiz").innerHTML = html;
}

function check() {
    let score = 0;

    selected.forEach((q, i) => {
        const ans = document.querySelector(`input[name=q${i}]:checked`);
        if (ans && ans.value == q.poprawna) score++;
    });

    document.getElementById("result").innerHTML =
        `Wynik: ${score} / ${selected.length} (${Math.round(score/selected.length*100)}%)`;
}
</script>

</body>
</html>
