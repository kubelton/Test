<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Test online</title>

<style>
body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
button { padding: 10px 15px; margin: 10px 5px; cursor: pointer; font-size: 14px; }
select { padding: 8px; font-size: 14px; }

.question {
    border: 1px solid #ddd;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    background-color: #f9f9f9;
}

label {
    display: block;
    margin: 5px 0;
    cursor: pointer;
}

input[type="radio"] {
    margin-right: 8px;
}
</style>

</head>
<body>

<h1>📘 Test online</h1>

<select id="categorySelect">
    <option value="all">📚 Wszystkie kategorie</option>
</select>

<br><br>

<button onclick="loadFromGit()">📥 Załaduj pytania</button>
<button onclick="start()">🚀 Start testu</button>

<div id="quiz"></div>
<div id="result" style="font-size:20px; margin-top:20px;"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

let questions = [];
let selected = [];

/* 🔴 LINK DO GITHUB RAW */
const FILE_URL = "https://raw.githubusercontent.com/kubelton/Test/main/test.xlsx";

/* 📥 LOAD EXCEL */
async function loadFromGit() {
    try {
        const response = await fetch(FILE_URL);
        if (!response.ok) throw new Error("Problem z pobraniem pliku z GitHub");
        
        const data = await response.arrayBuffer();

        const workbook = XLSX.read(new Uint8Array(data), { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];

        questions = XLSX.utils.sheet_to_json(sheet);

        buildCategories();

        alert("Załadowano pytań: " + questions.length);

    } catch (err) {
        alert("Błąd ładowania pliku! Sprawdź konsolę.");
        console.error(err);
    }
}

/* 📂 kategorie */
function buildCategories() {
    const select = document.getElementById("categorySelect");
    
    // RESET listy (zostawiamy tylko opcję "Wszystkie kategorie")
    select.innerHTML = '<option value="all">📚 Wszystkie kategorie</option>';

    // Pobranie unikalnych kategorii i usunięcie ewentualnych pustych wartości
    const categories = [...new Set(questions.map(q => q.kategoria).filter(Boolean))];

    categories.forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
    });
}

/* 🔀 odpowiedzi */
function shuffleAnswers(q) {
    // Normalizacja kluczy (na wypadek małych/wielkich liter w Excelu)
    return [
        { key: "A", text: q.A || q.a || "" },
        { key: "B", text: q.B || q.b || "" },
        { key: "C", text: q.C || q.c || "" },
        { key: "D", text: q.D || q.d || "" }
    ].sort(() => Math.random() - 0.5);
}

/* 🚀 START TESTU */
function start() {
    if (questions.length === 0) {
        alert("Najpierw załaduj pytania!");
        return;
    }

    // Resetowanie widoku wyniku z poprzedniego podejścia
    document.getElementById("result").innerHTML = "";

    const selectedCategory = document.getElementById("categorySelect").value;
    let pool = questions;

    /* 🔥 filtr kategorii */
    if (selectedCategory !== "all") {
        pool = questions.filter(q => q.kategoria === selectedCategory);
    }

    if (pool.length === 0) {
        alert("Brak pytań w tej kategorii!");
        return;
    }

    /* 🔀 losowanie max 60 pytań */
    selected = pool
        .map(q => ({ q, r: Math.random() }))
        .sort((a, b) => a.r - b.r)
        .map(x => x.q)
        .slice(0, 60)
        .sort(() => Math.random() - 0.5);

    let html = "";

    selected.forEach((q, i) => {
        const answers = shuffleAnswers(q);

        html += `
        <div class="question">
            <b>${i + 1}. ${q.pytanie}</b><br><br>
        `;

        answers.forEach(a => {
            html += `
            <label>
                <input type="radio" name="q${i}" value="${a.key}">
                ${a.text}
            </label>
            `;
        });

        html += `</div>`;
    });

    html += `<button onclick="check()">✅ Sprawdź wynik</button>`;

    document.getElementById("quiz").innerHTML = html;
}

/* 🧮 SPRAWDZANIE + POPRAWNE ODPOWIEDZI */
function check() {
    let score = 0;
    let resultHTML = "";

    selected.forEach((q, i) => {
        const ans = document.querySelector(`input[name=q${i}]:checked`);
        
        // Zabezpieczenie przed wielkością liter w kolumnie "poprawna" (np. "a" vs "A")
        const correctKey = q.poprawna ? q.poprawna.toString().toUpperCase().trim() : "";
        const userKey = ans ? ans.value.toUpperCase() : null;

        // Pobranie tekstu odpowiedzi z obiektu pytania
        const userText = userKey ? (q[userKey] || q[userKey.toLowerCase()] || "Brak tekstu") : "BRAK ODPOWIEDZI";
        const correctText = q[correctKey] || q[correctKey.toLowerCase()] || "Nieokreślona w pliku Excel";

        const isCorrect = userKey === correctKey;
        if (isCorrect) score++;

        resultHTML += `
        <div class="question" style="border-left: 5px solid ${isCorrect ? 'green' : 'red'};">
            <b>${i + 1}. ${q.pytanie}</b><br><br>

            Twoja odpowiedź:<br>
            <span style="color:${isCorrect ? 'green' : 'red'}; font-weight:bold;">
                ${userText}
            </span><br><br>

            Poprawna odpowiedź:<br>
            <span style="color:green; font-weight:bold;">
                ${correctText}
            </span>
        </div>
        `;
    });

    document.getElementById("result").innerHTML = `
        <hr>
        🏁 Wynik: <b>${score} / ${selected.length}</b> (${Math.round((score / selected.length) * 100)}%)<br><br>
        <h2>📊 Analiza:</h2>
        ${resultHTML}
    `;
    
    // Przewiń stronę do wyniku po sprawdzeniu
    document.getElementById("result").scrollIntoView({ behavior: 'smooth' });
}

</script>

</body>
</html>
